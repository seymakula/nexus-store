<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0a0f;
            --bg2: #111118;
            --bg3: #1a1a24;
            --bg4: #222230;
            --accent: #6c63ff;
            --accent2: #a78bfa;
            --text: #f0f0f8;
            --text2: #9898b0;
            --text3: #5a5a72;
            --border: rgba(255,255,255,0.08);
            --border2: rgba(255,255,255,0.14);
            --success: #22c55e;
            --card-hover: rgba(108,99,255,0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .logo span {
            color: var(--accent);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .search-bar {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 16px;
            color: var(--text);
            font-size: 14px;
            width: 220px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar:focus { border-color: var(--accent); }
        .search-bar::placeholder { color: var(--text3); }

        .cart-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 9px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .cart-btn:hover { opacity: 0.9; }
        .cart-btn:active { transform: scale(0.98); }

        .badge {
            background: white;
            color: var(--accent);
            border-radius: 20px;
            padding: 1px 7px;
            font-size: 12px;
            font-weight: 700;
        }

        .hero {
            padding: 60px 40px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero h2 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .hero p { color: var(--text2); font-size: 16px; }

        .filters {
            padding: 0 40px 24px;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 7px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
            padding: 0 40px 60px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
        }

        .card:hover {
            border-color: var(--accent);
            background: var(--bg3);
            transform: translateY(-4px);
        }

        .card-img {
            width: 100%;
            height: 180px;
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .stock-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(34,197,94,0.15);
            color: var(--success);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: 600;
        }

        .card-body { padding: 16px; }

        .card-category {
            font-size: 11px;
            color: var(--accent2);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }

        .card-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
        }

        .card-desc {
            font-size: 12px;
            color: var(--text2);
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .price {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .add-btn:hover { opacity: 0.85; transform: scale(1.05); }

        /* MODAL */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .overlay.open { display: flex; }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 20px;
            width: 440px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
        }

        .close-btn {
            background: var(--bg4);
            border: 1px solid var(--border);
            color: var(--text2);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover { color: var(--text); }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-icon {
            font-size: 24px;
            width: 44px;
            height: 44px;
            background: var(--bg3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-item-info { flex: 1; }
        .cart-item-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
        .cart-item-price { font-size: 13px; color: var(--text2); }
        .cart-item-total { font-size: 15px; font-weight: 700; color: var(--accent2); }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            padding: 16px 0 0;
            font-size: 16px;
            font-weight: 700;
        }

        .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

        .form-group { margin-bottom: 14px; }

        .form-label {
            display: block;
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus { border-color: var(--accent); }

        .order-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        .order-btn:hover { opacity: 0.9; }

        .success-box {
            text-align: center;
            padding: 24px 0;
        }

        .success-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .success-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--success);
        }

        .success-sub { color: var(--text2); font-size: 14px; }

        .empty-cart {
            text-align: center;
            padding: 32px 0;
            color: var(--text3);
        }

        .empty-cart-icon { font-size: 40px; margin-bottom: 12px; }
    </style>
</head>
<body>

<header>
    <div class="logo">NEX<span>US</span></div>
    <div class="header-right">
        <input class="search-bar" type="text" placeholder="Ürün ara..." oninput="filterProducts(this.value)">
        <button class="cart-btn" onclick="openCart()">
            Sepet <span class="badge" id="cart-count">0</span>
        </button>
    </div>
</header>

<div class="hero">
    <h2>Premium Teknoloji</h2>
    <p>En yeni ürünler, en iyi fiyatlar.</p>
</div>

<div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Tümü</button>
    <button class="filter-btn" onclick="setFilter('bilgisayar', this)">Bilgisayar</button>
    <button class="filter-btn" onclick="setFilter('telefon', this)">Telefon</button>
    <button class="filter-btn" onclick="setFilter('aksesuar', this)">Aksesuar</button>
</div>

<div class="products" id="products"></div>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
    <div class="modal" id="modal">
        <div class="modal-header">
            <div class="modal-title">Sepetim</div>
            <button class="close-btn" onclick="closeCart()">✕</button>
        </div>
        <div id="cart-content"></div>
    </div>
</div>

<script>
const API = 'http://127.0.0.1:5002/api';
let allProducts = [];
let cart = [];
let currentFilter = 'all';
let searchQuery = '';

const categories = {
    1: 'bilgisayar', 2: 'telefon', 3: 'aksesuar', 4: 'bilgisayar', 5: 'aksesuar'
};

const icons = {
    'Laptop': '💻', 'Telefon': '📱', 'Kulaklık': '🎧', 'Tablet': '📟', 'Akıllı Saat': '⌚'
};

async function loadProducts() {
    const res = await fetch(`${API}/products`);
    allProducts = await res.json();
    renderProducts();
}

function renderProducts() {
    let filtered = allProducts;
    if (currentFilter !== 'all') filtered = filtered.filter(p => categories[p.id] === currentFilter);
    if (searchQuery) filtered = filtered.filter(p => 
    p.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
    p.description.toLowerCase().includes(searchQuery.toLowerCase()) ||
    (categories[p.id] || '').toLowerCase().includes(searchQuery.toLowerCase())
);

    const container = document.getElementById('products');
    container.innerHTML = filtered.map(p => `
        <div class="card">
            <div class="card-img">
                ${icons[p.name] || '📦'}
                <div class="stock-badge">${p.stock} stok</div>
            </div>
            <div class="card-body">
                <div class="card-category">${categories[p.id] || 'elektronik'}</div>
                <div class="card-name">${p.name}</div>
                <div class="card-desc">${p.description}</div>
                <div class="card-footer">
                    <div class="price">₺${p.price.toLocaleString('tr-TR')}</div>
                    <button class="add-btn" onclick="addToCart(${JSON.stringify(p).replace(/"/g, '&quot;')})">+</button>
                </div>
            </div>
        </div>
    `).join('');
}

function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderProducts();
}

function filterProducts(q) {
    searchQuery = q;
    renderProducts();
}

function addToCart(product) {
    const existing = cart.find(i => i.id === product.id);
    if (existing) existing.quantity++;
    else cart.push({...product, quantity: 1});
    updateBadge();

    const btn = event.target;
    btn.textContent = '✓';
    btn.style.background = '#22c55e';
    setTimeout(() => { btn.textContent = '+'; btn.style.background = ''; }, 1000);
}

function updateBadge() {
    document.getElementById('cart-count').textContent = cart.reduce((a, i) => a + i.quantity, 0);
}

function openCart() {
    document.getElementById('overlay').classList.add('open');
    renderCart();
}

function closeCart() {
    document.getElementById('overlay').classList.remove('open');
}

function handleOverlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeCart();
}

function renderCart() {
    const content = document.getElementById('cart-content');
    if (cart.length === 0) {
        content.innerHTML = `
            <div class="empty-cart">
                <div class="empty-cart-icon">🛒</div>
                <div>Sepetiniz boş</div>
            </div>`;
        return;
    }

    const total = cart.reduce((a, i) => a + i.price * i.quantity, 0);
    content.innerHTML = `
        ${cart.map(i => `
            <div class="cart-item">
                <div class="cart-item-icon">${icons[i.name] || '📦'}</div>
                <div class="cart-item-info">
                    <div class="cart-item-name">${i.name}</div>
                    <div class="cart-item-price">₺${i.price.toLocaleString('tr-TR')} × ${i.quantity}</div>
                </div>
                <div class="cart-item-total">₺${(i.price * i.quantity).toLocaleString('tr-TR')}</div>
            </div>
        `).join('')}
        <div class="cart-total-row">
            <span>Toplam</span>
            <span>₺${total.toLocaleString('tr-TR')}</span>
        </div>
        <hr class="divider">
        <div class="form-group">
            <label class="form-label">Ad Soyad</label>
            <input class="form-input" id="customer-name" type="text" placeholder="Adınızı girin">
        </div>
        <div class="form-group">
            <label class="form-label">E-posta</label>
            <input class="form-input" id="customer-email" type="email" placeholder="E-posta adresiniz">
        </div>
        <button class="order-btn" onclick="placeOrder()">Siparişi Tamamla</button>
    `;
}

async function placeOrder() {
    const name = document.getElementById('customer-name').value;
    const email = document.getElementById('customer-email').value;
    if (!name || !email) { alert('Lütfen tüm alanları doldurun!'); return; }

    for (const item of cart) {
        await fetch(`${API}/orders`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ customer_name: name, customer_email: email, product_id: item.id, quantity: item.quantity })
        });
    }

    cart = [];
    updateBadge();

    document.getElementById('cart-content').innerHTML = `
        <div class="success-box">
            <div class="success-icon">✅</div>
            <div class="success-title">Siparişiniz Alındı!</div>
            <div class="success-sub">Teşekkürler ${name}! Siparişiniz işleme alındı.</div>
        </div>`;
}

loadProducts();
</script>
</body>
</html>
